<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>NestWorth</title>
<meta name="description" content="Household net worth tracker built for couples. Full transparency, shared goals, smart savings.">
<meta name="theme-color" content="#1a5e3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NestWorth">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet">
<style>
:root {
  --g:#2a7050;--gb:#349860;--gd:#1a5838;--gl:#60b888;
  --gld:#b89840;--glm:#c8a848;--gll:#d8c068;
  --tl:#208080;--or:#b87828;--rd:#b04040;--yl:#b89828;
  --t:#1a2818;--tm:#3a5840;--tl2:#708a70;--tf:#98b498;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);background:linear-gradient(172deg,#1a5e3a 0%,#2a7852 8%,#3a9068 16%,#50a880 26%,#6ac098 38%,#88d0b0 48%,#a8dcc0 58%,#c0e8cc 68%,#d4eed8 78%,#e4f4e4 86%,#eef8ee 92%,#f4faf2 100%);
  color:var(--t);min-height:100vh;max-width:430px;margin:0 auto;position:relative;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;padding-bottom:80px;
}
body::before{content:'';position:fixed;top:40px;left:-50px;width:220px;height:220px;background:radial-gradient(circle,rgba(216,192,104,0.1),transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:300px;right:-70px;width:260px;height:260px;background:radial-gradient(circle,rgba(255,255,255,0.12),transparent 60%);border-radius:50%;pointer-events:none;z-index:0}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}
input{font-family:var(--sans)}

/* ═══ Cards — warm sage/cream like mockups ═══ */
.c{background:rgba(248,252,242,0.58);backdrop-filter:blur(36px) saturate(1.6);-webkit-backdrop-filter:blur(36px) saturate(1.6);border:1px solid rgba(255,255,255,0.55);box-shadow:0 2px 24px rgba(12,40,22,0.06),inset 0 1px 0 rgba(255,255,255,0.7);border-radius:22px;padding:18px;margin-bottom:10px;position:relative;z-index:1}
.cs{background:rgba(252,255,246,0.68);backdrop-filter:blur(36px) saturate(1.6);-webkit-backdrop-filter:blur(36px) saturate(1.6);border:1px solid rgba(255,255,255,0.65);box-shadow:0 2px 24px rgba(12,40,22,0.06),inset 0 1px 0 rgba(255,255,255,0.8);border-radius:22px;padding:18px;margin-bottom:10px;position:relative;z-index:1}
.ci{background:rgba(255,255,248,0.5);border:1px solid rgba(255,255,255,0.5);border-radius:16px;padding:11px;box-shadow:inset 0 1px 4px rgba(12,40,22,0.02)}

/* ═══ Hero card — deeper, richer ═══ */
.hero{
  background:linear-gradient(155deg,rgba(20,78,48,0.94) 0%,rgba(38,110,65,0.88) 25%,rgba(58,140,88,0.74) 50%,rgba(88,168,115,0.58) 75%,rgba(120,200,150,0.4) 100%);
  backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);
  border-top:2px solid rgba(216,192,104,0.35);
  box-shadow:0 8px 48px rgba(12,40,22,0.16),inset 0 1px 0 rgba(255,255,255,0.08);
  border-radius:24px;overflow:hidden;position:relative;color:#fff;padding:20px 18px;margin-bottom:10px;z-index:1;
}
.hero::before{content:'';position:absolute;top:-25px;right:-15px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,0.06),transparent 70%);border-radius:50%}

/* ═══ Buttons — gold matching mockups ═══ */
.gold-btn{
  background:linear-gradient(180deg,#dcc06e 0%,#c4a24d 40%,#a68838 100%);
  border:1px solid rgba(216,192,104,0.25);border-radius:22px;color:#fff;font-weight:700;
  box-shadow:0 4px 16px rgba(180,140,50,0.24),inset 0 1px 0 rgba(255,220,120,0.4);
  text-shadow:0 1px 2px rgba(0,0,0,0.1);letter-spacing:0.2px;padding:10px 20px;font-size:13px;
}
.green-btn{
  background:linear-gradient(180deg,#48b878 0%,#2a8858 40%,#1a6840 100%);
  border:none;border-radius:28px;color:#fff;font-weight:700;
  box-shadow:0 6px 28px rgba(24,68,44,0.22),inset 0 1px 0 rgba(255,255,255,0.15);
  text-shadow:0 1px 2px rgba(0,0,0,0.1);padding:15px;font-size:15px;width:100%;display:block;
}

/* ═══ Serif italic headers — matching mockup style ═══ */
.shd{font-family:var(--serif);font-size:22px;font-weight:600;font-style:italic;color:var(--t);letter-spacing:-0.3px;margin-bottom:12px}
.shd-light{font-family:var(--serif);font-size:22px;font-weight:400;font-style:italic;color:var(--tl2)}

/* ═══ Layout ═══ */
.r{display:flex;align-items:center;gap:10px}
.dot{border-radius:50%;flex-shrink:0}
.bar-t{border-radius:5px;overflow:hidden;width:100%}
.bar-f{height:100%;border-radius:5px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
.badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:0.2px;white-space:nowrap}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;letter-spacing:-0.5px}

/* ═══ Toggle — gold like mockup ═══ */
.tog{width:50px;height:28px;border-radius:14px;position:relative;transition:background 0.3s;flex-shrink:0;min-width:50px}
.tog .th{width:22px;height:22px;border-radius:11px;background:#fff;position:absolute;top:3px;transition:left 0.2s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.tog.on{background:linear-gradient(180deg,#dcc06e,#b89840)}
.tog.off{background:rgba(0,0,0,0.08)}
.tog.on .th{left:25px}.tog.off .th{left:3px}
.tog.on::after{content:'On';position:absolute;left:7px;top:7px;font-size:10px;font-weight:700;color:#fff}
.tog.red.on{background:linear-gradient(180deg,#b04040,#903030)}
.tog.red.on::after{content:''}

/* ═══ Bottom Sheet ═══ */
.sho{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s}
.sho.open{opacity:1;pointer-events:auto}
.sh-bg{position:absolute;inset:0;background:rgba(8,20,10,0.5);backdrop-filter:blur(3px)}
.sh{position:relative;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,#f2f8ee,#e4f0e0);border-radius:20px 20px 0 0;padding:20px 16px 40px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1)}
.sho.open .sh{transform:translateY(0)}
.sh-h{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,0.1);margin:0 auto 14px}

/* ═══ Animations ═══ */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi 0.25s ease}
@keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(176,64,64,0.2)}50%{box-shadow:0 0 0 6px rgba(176,64,64,0)}}
.pu{animation:pu 2.5s ease infinite}

/* ═══ Tappable row ═══ */
.tr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.03);cursor:pointer}
.tr:last-child{border-bottom:none}
.tr:active{opacity:0.7}

/* ═══ Message bubbles ═══ */
.msg-out{max-width:78%;padding:12px 16px;font-size:13px;line-height:1.55;border-radius:20px 20px 4px 20px;background:linear-gradient(135deg,#2a7050,#349860);color:#fff;box-shadow:0 2px 14px rgba(24,68,44,0.16);margin-left:auto;margin-bottom:8px;word-break:break-word}
.msg-in{max-width:78%;padding:12px 16px;font-size:13px;line-height:1.55;border-radius:20px 20px 20px 4px;background:rgba(252,255,248,0.7);color:var(--t);border:1px solid rgba(255,255,255,0.5);box-shadow:0 1px 10px rgba(12,40,22,0.04),inset 0 1px 0 rgba(255,255,255,0.5);margin-bottom:8px;word-break:break-word}

/* ═══ Receipt scanner ═══ */
.scan-area{border:2px dashed rgba(42,112,80,0.2);border-radius:20px;padding:32px 16px;text-align:center;cursor:pointer;transition:background 0.2s,border-color 0.2s}
.scan-area:hover{background:rgba(42,112,80,0.03);border-color:rgba(42,112,80,0.35)}
.scan-result{background:rgba(252,255,248,0.7);border:1px solid rgba(255,255,255,0.5);border-radius:18px;padding:16px;box-shadow:0 2px 16px rgba(12,40,22,0.04)}

/* ═══ Tab bar ═══ */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(248,252,244,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(0,0,0,0.04);display:flex;justify-content:space-around;align-items:center;padding:5px 0 22px;z-index:100}
.tb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 4px;position:relative;min-width:0}
.tb span{font-size:9px;font-weight:500}
.tb.a span{font-weight:700}
.st-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 18px 0;font-size:13px;font-weight:600}
.app-hd{padding:4px 16px 6px;display:flex;justify-content:space-between;align-items:center}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:2px}
</style>
</head>
<body>

<!-- ══════ DOM ══════ -->
<div class="st-bar" id="stb" style="color:#fff"><span>9:41</span><div style="display:flex;gap:4px;align-items:center"><svg width="15" height="10" viewBox="0 0 17 12"><rect x="0" y="6" width="3" height="6" rx="1" fill="currentColor"/><rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="9" y="1.5" width="3" height="10.5" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg><div style="width:22px;height:10px;border-radius:3px;border:1.5px solid currentColor;padding:1px;display:flex;align-items:center"><div style="width:82%;height:100%;border-radius:1px;background:currentColor"></div></div></div></div>
<div class="app-hd" id="ahd"></div>
<div id="cnt" style="padding:0 10px 82px;position:relative;z-index:1"></div>
<div class="tab-bar" id="tbar"></div>
<div class="sho" id="sho"><div class="sh-bg" onclick="cs()"></div><div class="sh" id="shc"></div></div>

<script>
const V={g:'#2a7050',gb:'#349860',gd:'#1a5838',gl:'#60b888',gld:'#b89840',or:'#b87828',rd:'#b04040',yl:'#b89828',t:'#1a2818',tm:'#3a5840',tl:'#708a70',tf:'#98b498'};
let ct='home',cs_=null;
const T=['home','grow','plan','track','trust','coach'];

// ── Helpers ──
function br(p,c=V.gb,h=5){return`<div class="bar-t" style="height:${h}px;background:rgba(0,0,0,0.04)"><div class="bar-f" style="width:${Math.min(p,100)}%;background:linear-gradient(90deg,${c},${c}aa);height:${h}px"></div></div>`}
function av(l,s=26,c=V.g){return`<div class="av" style="width:${s}px;height:${s}px;background:${c}12;border:1.5px solid ${c}20;font-size:${s*.36}px;color:${c}">${l}</div>`}
function bg(t,c=V.gb){return`<span class="badge" style="color:${c};background:${c}12">${t}</span>`}
function tg(on,red=false){return`<div class="tog ${on?'on':'off'} ${red&&on?'red':''}" onclick="event.stopPropagation()"><div class="th"></div></div>`}
function hd(t,sub=''){return`<div style="margin-bottom:12px"><span class="shd">${t}</span>${sub?`<span class="shd-light"> ${sub}</span>`:''}</div>`}
function sp(){const d=[81200,81400,81100,81800,82000,82130,82450],w=150,h=48,mn=Math.min(...d),mx=Math.max(...d),rg=mx-mn;const pts=d.map((v,i)=>`${(i/(d.length-1))*w},${h-((v-mn)/rg)*h*.7-h*.15}`).join(' ');const lp=pts.split(' ').pop().split(',');return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="sf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff" stop-opacity="0.25"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${pts} ${w},${h}" fill="url(#sf)"/><polyline points="${pts}" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lp[0]}" cy="${lp[1]}" r="4" fill="#fff" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></svg>`}

function os(t,c){document.getElementById('shc').innerHTML=`<div class="sh-h"></div><div class="shd" style="margin-bottom:14px">${t}</div>${c}`;document.getElementById('sho').classList.add('open')}
function cs(){document.getElementById('sho').classList.remove('open')}
function gt(t){ct=t;cs_=null;rr()}
function gs(s){cs_=s;rr()}
function gb(){cs_=null;rr()}

// ═══════════════ HOME ═══════════════
function rHome(){
return`<div class="fi">
<div class="hero" style="padding:20px 18px 16px">
  <div style="font-family:var(--serif);font-size:13px;font-weight:400;font-style:italic;opacity:0.9">Household Net Worth</div>
  <div style="font-size:40px;font-weight:900;letter-spacing:-2px;line-height:1.05;margin-top:3px">$82,450</div>
  <div class="r" style="margin-top:3px;gap:6px"><span style="font-size:13px;font-weight:600;color:#90e8b8">+$320 today</span>${bg('+1.2%','#90e8b8')}</div>
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px">${sp()}<div style="display:flex;background:rgba(255,255,255,0.1);border-radius:10px;border:1px solid rgba(255,255,255,0.14);overflow:hidden">${['7D','30D','90D','1Y'].map((r,i)=>`<button style="padding:5px 10px;font-size:10px;font-weight:700;color:#fff;background:${i===0?'rgba(255,255,255,0.16)':'transparent'}">${r}</button>`).join('')}</div></div>
</div>

<!-- Health Score -->
<div class="c r" style="padding:12px 16px;cursor:pointer" onclick="os('Financial Health',sHS())">
  <div style="width:44px;height:44px;border-radius:22px;background:conic-gradient(${V.gb} 74%,rgba(0,0,0,0.04) 0);display:flex;align-items:center;justify-content:center;flex-shrink:0"><div style="width:34px;height:34px;border-radius:17px;background:rgba(255,255,248,0.75);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${V.g}">74</div></div>
  <div style="flex:1"><div style="font-weight:700;font-size:13px">Financial Health Score</div><div style="font-size:10px;color:${V.tl}">Good · Sync issue & overspend pulling score down</div></div>
  <span style="color:${V.tl}">›</span>
</div>

<!-- Velocity Alert -->
<div class="c r" style="padding:10px 14px;background:rgba(176,64,64,0.04);border:1px solid rgba(176,64,64,0.08);cursor:pointer" onclick="os('Spending Velocity',sVel())">
  <div style="width:30px;height:30px;border-radius:15px;background:rgba(176,64,64,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${V.rd}" stroke-width="2.5" stroke-linecap="round"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div>
  <div style="flex:1"><div style="font-weight:700;font-size:12px;color:${V.rd}">Spending 38% faster than last week</div><div style="font-size:10px;color:${V.tl}">May exceed budget by $420</div></div>
</div>

<!-- Today's Move -->
<div class="c r" style="padding:14px 16px">
  <div style="width:40px;height:40px;border-radius:13px;background:linear-gradient(150deg,#90d8a8,#50b878);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
  <div style="flex:1"><div style="font-weight:700;font-size:14px">Today's Move</div><div style="font-size:11px;color:${V.tm}">Move $15 to Emergency Fund</div></div>
  <button class="gold-btn">Do It ›</button>
</div>

<!-- Messages shortcut -->
<div class="c r" style="padding:12px 16px;cursor:pointer" onclick="gs('msg')">
  <div style="width:36px;height:36px;border-radius:18px;background:rgba(42,112,80,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${V.g}" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
  <div style="flex:1"><div style="font-weight:700;font-size:13px">Messages</div><div style="font-size:10px;color:${V.tl}">Chat with Caroline · 2 unread</div></div>
  <div style="width:20px;height:20px;border-radius:10px;background:${V.rd};color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">2</div>
</div>

<!-- Spending -->
<div class="cs">
  ${hd('Spending','This Week')}
  <div class="r" style="margin-bottom:12px;margin-top:-8px"><div style="margin-left:auto;display:flex;gap:3px">${av('V',18)}${av('C',18,V.or)}</div></div>
  ${[{c:'Groceries',a:120,m:200,cl:V.gb,v:75,ca:45},{c:'Dining Out',a:280,m:300,cl:V.or,v:140,ca:140,w:true},{c:'Shopping',a:235,m:200,cl:V.rd,v:85,ca:150,o:true},{c:'Entertainment',a:85,m:150,cl:'#208080',v:40,ca:45},{c:'Transport',a:45,m:100,cl:'#5a8860',v:30,ca:15}].map(s=>`<div style="margin-bottom:12px;cursor:pointer" onclick="os('${s.c}',sCat('${s.c}',${s.a},${s.m},${s.v},${s.ca}))"><div class="r" style="margin-bottom:2px;gap:4px"><span style="font-size:12px;font-weight:600;flex:1">${s.c}</span>${s.o?bg('OVER',V.rd):''}${s.w?bg('93%',V.or):''}<span style="font-size:12px;font-weight:800;color:${s.o?V.rd:V.t}">$${s.a}<span style="font-weight:400;color:${V.tl};font-size:10px">/${s.m}</span></span></div>${br((s.a/s.m)*100,s.o?V.rd:s.w?V.or:s.cl)}<div style="display:flex;gap:8px;margin-top:3px;font-size:9px;color:${V.tl}"><span style="color:${V.g}">● Von $${s.v}</span><span style="color:${V.or}">● Caroline $${s.ca}</span></div></div>`).join('')}
</div>

<!-- Accounts -->
<div class="c" style="cursor:pointer" onclick="gs('acct')">
  <div class="r" style="margin-bottom:10px">${hd('Accounts')}<span style="margin-left:auto;font-size:11px;font-weight:600;color:${V.g}">View All ›</span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
    ${[{l:'Chase Checking',a:'$5,360',s:'g'},{l:'Chase Savings',a:'$12,400',s:'g'},{l:'Capital One',a:'$2,100',s:'y'},{l:'Cap One Savings',a:'$8,200',s:'r'},{l:'Ally Invest',a:'$26,500',s:'g'},{l:'Credit Cards',a:'-$1,200',s:'g'}].map(x=>`<div class="ci" style="padding:8px 10px;position:relative"><div class="dot" style="position:absolute;top:6px;right:6px;width:6px;height:6px;background:${x.s==='g'?V.gb:x.s==='y'?V.yl:V.rd}"></div><div style="font-size:10px;font-weight:600;color:${V.tm};margin-bottom:2px">${x.l}</div><div style="font-size:15px;font-weight:800;color:${x.s==='r'?V.rd:V.t}">${x.a}</div>${x.s==='r'?`<div style="font-size:8px;font-weight:700;color:${V.rd}">47d stale</div>`:''}</div>`).join('')}
  </div>
</div>

<!-- Bills Due -->
